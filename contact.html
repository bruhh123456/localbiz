<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Contact & Location — Baby Panda</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="logo">Baby Panda</h1>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact & Location</a>
      </nav>
    </div>
  </header>

  <section class="hero">
    <div class="container">
      <h2>Contact & Location</h2>
      <p>Get in touch or find us in person.</p>
      <img src="images/hi.webp" alt="Contact and location at Baby Panda" class="hero-img hero-bottom-img" onerror="this.onerror=null;this.src='images/fallback.svg';">
    </div>
  </section>

  <main class="container contact-page">
    <h2>Contact Us</h2>
    <p>Phone: (555) 123-4567</p>
    <p>Email: hello@babypanda.example</p>

    <h3>Send a Message</h3>
    <form class="contact-form" action="#" method="post" onsubmit="alert('This demo form does not send messages.'); return false;">
      <label>Name
        <input type="text" name="name" required>
      </label>
      <label>Email
        <input type="email" name="email" required>
      </label>
      <label>Message
        <textarea name="message" rows="5" required></textarea>
      </label>
      <button type="submit" class="btn">Send</button>
    </form>

    <h3>Location</h3>
    <p>123 Bamboo Lane, YourCity, YourState</p>
    <div class="map">
      <iframe
        width="100%"
        height="300"
        frameborder="0"
        style="border:0"
        src="https://www.google.com/maps?q=123+Bamboo+Lane&output=embed"
        allowfullscreen>
      </iframe>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Baby Panda Chinese Restaurant</p>
    </div>
  </footer>
</body>
</html>
